name: SimplScreens
options:
  bundleIdPrefix: com.sudobuiltapps
  deploymentTarget:
    tvOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  SimplScreens:
    type: application
    platform: tvOS
    sources:
      - Shared
      - tvOS
    resources:
      - tvOS/Resources/**
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sudobuiltapps.simplscreens
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "2"
        INFOPLIST_FILE: tvOS/Info.plist
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: 9G5Y8G34K5
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "SimplScreens tvOS App Store"
